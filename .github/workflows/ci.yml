name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint Python code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on scrapers
        run: |
          flake8 scrapers/ \
            --max-line-length=120 \
            --exclude=scrapers/data/ \
            --ignore=E221,E226,W292,E302,W503,E501

      - name: Run flake8 on airflow dags
        run: |
          flake8 airflow/dags/ \
            --max-line-length=120 \
            --ignore=E501,W503

  dbt-test:
    name: Run dbt tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.7.8

      - name: Check dbt project exists
        run: |
          if [ -d "dbt_ecommerce" ]; then
            echo "dbt project found"
          else
            echo "No dbt project yet - skipping"
            exit 0
          fi

      - name: Run dbt compile (validates SQL)
        working-directory: dbt_ecommerce
        env:
          DBT_PROFILES_DIR: .
        run: dbt compile --profiles-dir . || echo "dbt compile skipped"