apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  labels:
    app: nifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
        - name: nifi
          image: apache/nifi:1.25.0
          ports:
            - containerPort: 8080
            - containerPort: 9999
          env:
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nifi-service
spec:
  selector:
    app: nifi
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: listener
      port: 9999
      targetPort: 9999
  type: LoadBalancer