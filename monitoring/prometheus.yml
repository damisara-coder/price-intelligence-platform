global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: airflow
    static_configs:
      - targets: ["airflow-webserver:8080"]
    metrics_path: /metrics

  - job_name: nifi
    static_configs:
      - targets: ["nifi:8080"]
    metrics_path: /nifi-api/flow/metrics/prometheus

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9092"]